<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Handwriter</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel panel-left">
        <div class="mode-tabs" role="tablist" aria-label="Recognition modes">
          <button id="mode-draw-button" class="mode-tab" type="button" data-active="true">Draw</button>
          <button id="mode-upload-button" class="mode-tab button-secondary" type="button" data-active="false">Upload Image</button>
        </div>

        <div class="panel-header">
          <div>
            <p class="eyebrow">Mode</p>
            <h1 id="mode-title">Draw</h1>
          </div>
        </div>

        <div id="draw-panel">
          <label class="field">
            <span>Language</span>
            <select id="language-select">
              <option value="en" selected>English</option>
            </select>
          </label>

          <div class="canvas-wrap">
            <canvas id="draw-canvas" aria-label="Handwriting canvas"></canvas>
          </div>

          <div class="actions">
            <button id="clear-button" type="button" class="button-secondary">Clear</button>
          </div>
        </div>

        <div id="upload-panel" hidden>
          <label class="field">
            <span>Handwriting Image</span>
            <input id="image-file" type="file" accept="image/png,image/jpeg,image/webp" />
          </label>

          <p id="image-file-name" class="file-name">No file selected.</p>

          <div class="upload-preview-wrap">
            <img id="upload-preview-image" alt="Selected handwriting preview" hidden />
          </div>

          <div class="actions">
            <button id="upload-recognize-button" type="button">Recognize</button>
            <button id="upload-clear-button" type="button" class="button-secondary">Clear</button>
          </div>
        </div>

        <p id="mode-hint" class="hint">
          Draw with a mouse, trackpad, or touch. Recognition runs against Google Input Tools through the local app server.
        </p>
      </section>

      <section class="panel panel-right">
        <div class="result-card">
          <p class="eyebrow">Recognized Text</p>
          <div id="result-text" class="result-text">Nothing recognized yet.</div>
        </div>

        <div class="result-card">
          <p class="eyebrow">Alternatives</p>
          <ul id="candidate-list" class="candidate-list">
            <li>No alternatives yet.</li>
          </ul>
        </div>

        <div id="status" class="status">Draw something. Recognition starts after you pause.</div>
      </section>
    </main>

    <script type="module" src="/js/app.js"></script>
  </body>
  </html>
