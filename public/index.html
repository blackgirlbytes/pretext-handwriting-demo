<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Handwriter</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel panel-left">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Mode</p>
            <h1>Draw</h1>
          </div>
          <label class="field">
            <span>Language</span>
            <select id="language-select">
              <option value="en" selected>English</option>
            </select>
          </label>
        </div>

        <div class="canvas-wrap">
          <canvas id="draw-canvas" aria-label="Handwriting canvas"></canvas>
        </div>

        <div class="actions">
          <button id="recognize-button" type="button">Recognize</button>
          <button id="clear-button" type="button" class="button-secondary">Clear</button>
        </div>

        <p class="hint">
          Draw with a mouse, trackpad, or touch. Recognition runs against Google Input Tools through the local app server.
        </p>
      </section>

      <section class="panel panel-right">
        <div class="result-card">
          <p class="eyebrow">Recognized Text</p>
          <div id="result-text" class="result-text">Nothing recognized yet.</div>
        </div>

        <div class="result-card">
          <p class="eyebrow">Alternatives</p>
          <ul id="candidate-list" class="candidate-list">
            <li>No alternatives yet.</li>
          </ul>
        </div>

        <div id="status" class="status">Draw something, then click Recognize.</div>
      </section>
    </main>

    <script type="module" src="/js/app.js"></script>
  </body>
  </html>
